name: CI

on:
  push:
    tags: ["v*"]
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  RUST_LOG: "tuic_server=TRACE,tuic_client=TRACE"
  RUST_TOOLCHAIN: "stable"
  RUSTC_BOOTSTRAP: "1"
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  CROSS_NO_WARNINGS: "0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

permissions:
  contents: write

jobs:
  build:
    name: Build
    uses: rust-proxy/workflows/.github/workflows/rust-build.yml@v1.0.35
    secrets:
      sentry-dsn: ${{ secrets.SENTRY_DSN }}
    with:
      rust-toolchain: "stable"
      packages: "tuic-server,tuic-client"
      target-config-file: ".github/target.toml"
      rustflags: ""
      enable-tmate: false
      enable-sccache: true
      only-clippy-tests-on-pr: false

  checksums:
    name: Checksums
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: "*-binaries"
          path: ./packages
          merge-multiple: true

      - name: Generate Checksums
        run: |
          cd packages
          sha256sum * > sha256sum.txt

      - name: Upload Checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums-binaries
          path: packages/sha256sum.txt

  release:
    name: Release
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    needs: [build, checksums]
    uses: rust-proxy/workflows/.github/workflows/release-publish.yml@v1.0.35
    with:
      cliff-config: '.github/cliff.toml'


