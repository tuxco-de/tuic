name: Build binaries

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-binaries-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-musl
            suffix: x86_64-linux-musl
          - arch: aarch64
            target: aarch64-unknown-linux-musl
            suffix: aarch64-linux-musl

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Build release binaries
        run: >-
          cross build --locked --release
          --target ${{ matrix.target }}
          --features jemallocator
          --package tuic-server
          --package tuic-client

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/tuic-server" "dist/tuic-server-${{ matrix.suffix }}"
          cp "target/${{ matrix.target }}/release/tuic-client" "dist/tuic-client-${{ matrix.suffix }}"
          chmod +x dist/*
          sha256sum dist/* > "dist/SHA256SUMS-${{ matrix.suffix }}"

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: tuic-${{ matrix.suffix }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14
